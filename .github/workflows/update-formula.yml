name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.client_payload.version }}
      SHA_AARCH64_DARWIN: ${{ github.event.client_payload.sha256_aarch64_darwin }}
      SHA_X86_64_DARWIN: ${{ github.event.client_payload.sha256_x86_64_darwin }}
      SHA_AARCH64_LINUX: ${{ github.event.client_payload.sha256_aarch64_linux }}
      SHA_X86_64_LINUX: ${{ github.event.client_payload.sha256_x86_64_linux }}
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          # Strip leading 'v' from version tag
          CLEAN_VERSION="${VERSION#v}"

          cat > Formula/ccmd.rb << 'FORMULA_EOF'
          # typed: false
          # frozen_string_literal: true

          class Ccmd < Formula
            desc "Cache Commander — a TUI for browsing and managing cache directories"
            homepage "https://github.com/juliensimon/cache-commander"
            version "PLACEHOLDER_VERSION"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/juliensimon/cache-commander/releases/download/vPLACEHOLDER_VERSION/ccmd-aarch64-apple-darwin.tar.gz"
                sha256 "PLACEHOLDER_AARCH64_DARWIN"
              end
              on_intel do
                url "https://github.com/juliensimon/cache-commander/releases/download/vPLACEHOLDER_VERSION/ccmd-x86_64-apple-darwin.tar.gz"
                sha256 "PLACEHOLDER_X86_64_DARWIN"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/juliensimon/cache-commander/releases/download/vPLACEHOLDER_VERSION/ccmd-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "PLACEHOLDER_AARCH64_LINUX"
              end
              on_intel do
                url "https://github.com/juliensimon/cache-commander/releases/download/vPLACEHOLDER_VERSION/ccmd-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "PLACEHOLDER_X86_64_LINUX"
              end
            end

            def install
              bin.install "ccmd"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/ccmd --version")
            end
          end
          FORMULA_EOF

          # Replace placeholders
          sed -i "s/PLACEHOLDER_VERSION/${CLEAN_VERSION}/g" Formula/ccmd.rb
          sed -i "s/PLACEHOLDER_AARCH64_DARWIN/${SHA_AARCH64_DARWIN}/g" Formula/ccmd.rb
          sed -i "s/PLACEHOLDER_X86_64_DARWIN/${SHA_X86_64_DARWIN}/g" Formula/ccmd.rb
          sed -i "s/PLACEHOLDER_AARCH64_LINUX/${SHA_AARCH64_LINUX}/g" Formula/ccmd.rb
          sed -i "s/PLACEHOLDER_X86_64_LINUX/${SHA_X86_64_LINUX}/g" Formula/ccmd.rb

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/ccmd.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ccmd.rb
          git commit -m "Update ccmd to ${VERSION}"
          git push
